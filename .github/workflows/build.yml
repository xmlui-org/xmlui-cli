name: Build Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for this release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:

  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
            out: xmlui
            label: linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
            out: xmlui
            label: macos-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
            out: xmlui
            label: macos-intel
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
            out: xmlui.exe
            label: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: xmlui-cli

      - name: Clone xmlui-mcp dependency
        run: |
          git clone --branch hajagosnorbert/demo https://github.com/xmlui-org/xmlui-mcp.git xmlui-mcp

      - uses: actions/setup-go@v4
        with:
          go-version: "1.25"

      - name: Install build tools (Linux only)
        if: matrix.os == 'ubuntu-latest' && matrix.goos != 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install mingw-w64 for Windows CGO cross-compilation
        if: matrix.goos == 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Build
        working-directory: xmlui-cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          CC: ${{ matrix.goos == 'windows' && 'x86_64-w64-mingw32-gcc' || 'gcc' }}
        run: |
          go build -v -o ${{ matrix.out }}
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            zip xmlui-${{ matrix.label }}.${{ matrix.archive }} ${{ matrix.out }}
          else
            tar -czf xmlui-${{ matrix.label }}.${{ matrix.archive }} ${{ matrix.out }}
          fi

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: xmlui-cli/xmlui-${{ matrix.label }}.${{ matrix.archive }}
          tag_name: ${{ github.event.inputs.tag }}
          body: |
            Extract the `xmlui` binary

            - Windows: `unzip xmlui-windows-amd64.zip`

            - Linux: `tar -xzf xmlui-linux-amd64.tar.gz`

            - Mac: `tar -xzf xmlui-macos-[arm64|intel].tar.gz`

            Handle Mac quarantine:

            - `xattr -d com.apple.quarantine xmlui`

            Optional: Place `xmlui` on system path

