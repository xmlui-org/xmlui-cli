name: Build Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for this release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:

  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
            out: xmlui
            label: linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
            out: xmlui
            label: macos-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
            out: xmlui
            label: macos-intel
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
            out: xmlui.exe
            label: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: xmlui-cli

      - name: Clone xmlui-mcp dependency
        run: |
          git clone --branch main https://github.com/xmlui-org/xmlui-mcp.git xmlui-mcp

      - uses: actions/setup-go@v4
        with:
          go-version: "1.25"

      - name: Install build tools (Linux only)
        if: matrix.os == 'ubuntu-latest' && matrix.goos != 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install mingw-w64 for Windows CGO cross-compilation
        if: matrix.goos == 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Build
        working-directory: xmlui-cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          CC: ${{ matrix.goos == 'windows' && 'x86_64-w64-mingw32-gcc' || 'gcc' }}
        run: |
          go build -v -ldflags "-X main.version=${{ github.event.inputs.tag }}" -o ${{ matrix.out }}
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            zip xmlui-${{ matrix.label }}.${{ matrix.archive }} ${{ matrix.out }}
          else
            tar -czf xmlui-${{ matrix.label }}.${{ matrix.archive }} ${{ matrix.out }}
          fi

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: xmlui-cli/xmlui-${{ matrix.label }}.${{ matrix.archive }}
          tag_name: ${{ github.event.inputs.tag }}
          body: |
            ## Install

            macOS / Linux (verifies SHA256, installs on PATH):

            ```bash
            curl -fsSL https://github.com/xmlui-org/xmlui-cli/releases/download/${{ github.event.inputs.tag }}/install.sh | sh
            ```

            Windows PowerShell (verifies SHA256, installs on PATH):

            ```powershell
            powershell -NoProfile -ExecutionPolicy Bypass -Command "irm https://github.com/xmlui-org/xmlui-cli/releases/download/${{ github.event.inputs.tag }}/install.ps1 | iex"
            ```

            ## Manual install (audit-friendly)

            ```bash
            # Download artifact + checksums
            curl -fsSLO https://github.com/xmlui-org/xmlui-cli/releases/${{ github.event.inputs.tag }}/download/SHA256SUMS
            curl -fsSLO https://github.com/xmlui-org/xmlui-cli/releases/${{ github.event.inputs.tag }}/download/xmlui-macos-arm64.tar.gz   # or your platform
            shasum -a 256 -c SHA256SUMS --ignore-missing
            tar -xzf xmlui-*.tar.gz
            ./xmlui install
            ```

            On macOS, if installing from a browser download instead of curl, also run:

            ```bash
            xattr -d com.apple.quarantine xmlui
            ```

            On Windows, use `Expand-Archive` on `xmlui-windows-amd64.zip`, then run:

            ```powershell
            .\xmlui.exe install --add-to-path
            ```

  publish-checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all release artifacts
        run: |
          mkdir artifacts
          cd artifacts
          for asset in xmlui-linux-amd64.tar.gz xmlui-macos-arm64.tar.gz xmlui-macos-intel.tar.gz xmlui-windows-amd64.zip; do
            curl -fsSL -o "${asset}" \
              "https://github.com/${{ github.repository }}/releases/download/${{ github.event.inputs.tag }}/${asset}"
          done

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: |
          shasum -a 256 *.tar.gz *.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Checkout repository (for install.sh)
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Append installer script hashes to SHA256SUMS
        run: |
          shasum -a 256 repo/install.sh | sed 's| repo/| |' >> artifacts/SHA256SUMS
          shasum -a 256 repo/install.ps1 | sed 's| repo/| |' >> artifacts/SHA256SUMS
          cat artifacts/SHA256SUMS

      - name: Upload SHA256SUMS and installer scripts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/SHA256SUMS
            repo/install.sh
            repo/install.ps1
          tag_name: ${{ github.event.inputs.tag }}
